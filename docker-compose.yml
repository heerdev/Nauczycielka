version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nauczycielka-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    pull_policy: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nauczycielka-network

  nauczycielka-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nauczycielka-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=nauczycielka
      - OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/nauczycielka
      - SPRING_DATASOURCE_USERNAME=nauczycielka_user
      - SPRING_DATASOURCE_PASSWORD=nauczycielka_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
      - LOGGING_LEVEL_COM_NAUCZYCIELKA=DEBUG
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nauczycielka-network

  postgres:
    image: postgres:16-alpine
    container_name: nauczycielka-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nauczycielka
      - POSTGRES_USER=nauczycielka_user
      - POSTGRES_PASSWORD=nauczycielka_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nauczycielka_user -d nauczycielka"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nauczycielka-network

volumes:
  ollama_data:
    driver: local
  postgres_data:
    driver: local

networks:
  nauczycielka-network:
    driver: bridge
